<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem e-RMT SJKC Maran</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body { background: linear-gradient(to right,#004e92,#000428); color:white; }
.card { border-radius:15px; }
.logo { height:80px; }
.btn-main { width:100%; padding:18px; font-size:18px; border-radius:15px; }
#qr-reader { width:100%; margin-top:10px; }
</style>
</head>
<body>

<div class="container py-4 text-center">

<img src="logo.png" class="logo mb-3">

<h3>Sistem e-RMT<br>SJKC Maran</h3>

<div id="loginSection" class="card p-4 mt-3 text-dark">
<input type="password" id="pinInput" class="form-control mb-2" placeholder="Masukkan Password">
<button class="btn btn-primary" onclick="login()">Login</button>
</div>

<div id="dashboardSection" style="display:none;">

<div class="card p-3 mt-3 text-dark">
<h5>Status Hari Ini</h5>
<p>Kuota Layak: <span id="eligibleCount">0</span></p>
<p>Sudah Digunakan: <span id="usedQuota">0</span></p>
<p>Baki: <span id="remainingQuota">0</span></p>
</div>

<div class="row mt-3">
<div class="col-6"><button class="btn btn-success btn-main" onclick="startScanner()">Scan QR</button></div>
<div class="col-6"><button class="btn btn-warning btn-main" onclick="showAbsent()">Tidak Hadir</button></div>
</div>

<div id="qr-reader"></div>
<div id="absentList" class="mt-3"></div>

<div id="adminSection" style="display:none;" class="mt-3">
<button class="btn btn-dark btn-main" onclick="setQuota()">Tetapkan Jumlah Layak</button>
</div>

</div>

<script>

// ======= FIREBASE CONFIG =======
const firebaseConfig = const firebaseConfig = {
  apiKey: "XXXX",
  authDomain: "XXXX",
  projectId: "XXXX",
  storageBucket: "XXXX",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};;

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ======= LOGIN =======
let role="teacher";

function login(){
  const pass=document.getElementById("pinInput").value;

  if(pass==="89898899"){
    role="admin";
    document.getElementById("adminSection").style.display="block";
  } else if(pass.startsWith("SJKCMARAN")){
    role="teacher";
  } else { alert("Password Salah"); return; }

  document.getElementById("loginSection").style.display="none";
  document.getElementById("dashboardSection").style.display="block";
}

// ======= SCANNER =======
function startScanner(){
  const scanner=new Html5Qrcode("qr-reader");

  scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    async (text)=>{
      await push(ref(db,"claims"),{
        studentId:text,
        time:new Date().toISOString()
      });
      scanner.stop();
      alert("Scan berjaya: "+text);
    }
  );
}

// ======= REALTIME SYNC =======
onValue(ref(db,"claims"),(snapshot)=>{
  const data=snapshot.val()||{};
  const count=Object.keys(data).length;
  document.getElementById("usedQuota").innerText=count;

  onValue(ref(db,"quota"),(snap)=>{
    const quota=snap.val()||37;
    document.getElementById("eligibleCount").innerText=quota;
    document.getElementById("remainingQuota").innerText=quota-count;
  });
});

// ======= ADMIN SET QUOTA =======
function setQuota(){
  const num=parseInt(prompt("Masukkan jumlah layak:"));
  if(!num) return;
  set(ref(db,"quota"),num);
}

// ======= ABSENT LIST =======
function showAbsent(){
  alert("Versi penuh akan kira berdasarkan database pelajar.");
}

</script>
</body>
</html>
