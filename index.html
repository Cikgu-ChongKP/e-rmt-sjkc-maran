<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem e-RMT SJKC Maran - Web</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<style>
body { background-color: #f4f6f9; }
.card { border-radius: 15px; }
.btn-main { width: 100%; padding: 20px; font-size: 18px; border-radius: 15px; }
#qr-reader { width:100%; margin-top:10px; }
.qr-list img { width:80px; height:80px; margin:5px; }
#scanResult { margin-top:10px; font-weight:bold; color:#2a2a2a; }
</style>
</head>
<body>
<div class="container py-4">
<h3 class="text-center mb-4">Sistem e-RMT<br><small>SJKC Maran</small></h3>

<!-- Login Section -->
<div id="loginSection" class="card p-4 shadow">
<h5>Login Sistem</h5>
<input type="password" id="pinInput" class="form-control my-2" placeholder="Masukkan Password">
<button class="btn btn-primary w-100" onclick="login()">Login</button>
</div>

<!-- Dashboard Section -->
<div id="dashboardSection" style="display:none;">
<div class="card p-3 mb-3 shadow">
<h5>Status Hari Ini</h5>
<p>Tarikh: <span id="todayDate"></span></p>
<p>Device ID: <span id="deviceId"></span></p>
<p>Jumlah Kuota: <span id="eligibleCount">37</span></p>
<p>Sudah Digunakan: <span id="usedQuota">0</span></p>
<p>Baki Kuota: <span id="remainingQuota">37</span></p>
<p>Formal: <span id="formalCount">0</span>, Pre-Approved: <span id="preCount">0</span>, Substitute: <span id="subCount">0</span></p>
</div>

<div class="row g-3 mb-3">
  <div class="col-6"><button class="btn btn-success btn-main" onclick="promptScan()">Scan Manual</button></div>
  <div class="col-6"><button class="btn btn-info btn-main" onclick="startQrScanner()">Scan QR/Barcode</button></div>
  <div class="col-6"><button class="btn btn-warning btn-main" onclick="showAbsentees()">Tidak Hadir</button></div>
  <div class="col-6"><button id="editStudentBtn" class="btn btn-secondary btn-main" onclick="editStudentPrompt()">Ubah Pelajar</button></div>
</div>

<div id="qr-reader"></div>
<div id="scanResult"></div>

<!-- QR 生成列表 (Admin) -->
<div id="qrListContainer" class="mt-4">
<h5>QR Pelajar (Hanya Admin)</h5>
<div id="qrList" class="qr-list d-flex flex-wrap"></div>
</div>

<div id="absentList" class="mt-3"></div>
</div>

<script>
// ------------------- 初始化数据 -------------------
let students=[], claims=[], currentRole="teacher", currentUser="";
let eligibleCount=37; // Admin可调
const channel=new BroadcastChannel('ermt_channel');

// 生成学生数据
for(let i=1;i<=94;i++){
  let id="S"+String(i).padStart(3,"0");
  students.push({
    studentId:id,
    name:"Pelajar "+i,
    grade:"Tingkatan "+((i%6)+1),
    eligible:i<=eligibleCount,
    preApproved:i>=35 && i<=37,
    claimed:false
  });
}

// ------------------- 登录 -------------------
function login(){
  const password=document.getElementById("pinInput").value.trim();
  if(password==="89898899"){ currentRole="admin"; currentUser="Admin"; }
  else{ 
    const teacherPasswords=[];
    for(let i=1;i<=15;i++) teacherPasswords.push("SJKCMARAN"+String(i).padStart(3,"0"));
    if(teacherPasswords.includes(password)){ currentRole="teacher"; currentUser=password; }
    else { alert("Password Salah!"); return; }
  }
  document.getElementById("loginSection").style.display="none";
  document.getElementById("dashboardSection").style.display="block";
  initSystem();
}

// ------------------- 初始化 -------------------
function initSystem(){
  generateDeviceId(); showTodayDate(); updateQuotaDisplay(); checkDailyFreeze();
  if(currentRole==="admin"){ addAdminQuotaButton(); generateAllQRCodes(); }
  else{ document.getElementById("editStudentBtn").style.display="none"; document.getElementById("qrListContainer").style.display="none"; }
}

// ------------------- 设备ID & 日期 -------------------
function generateDeviceId(){
  if(!localStorage.getItem("deviceId")) localStorage.setItem("deviceId","device_"+Math.random().toString(36).substr(2,9));
  document.getElementById("deviceId").innerText=localStorage.getItem("deviceId");
}
function showTodayDate(){ document.getElementById("todayDate").innerText=new Date().toISOString().split('T')[0]; }

// ------------------- 更新统计 -------------------
function updateQuotaDisplay(){
  const formalCount = claims.filter(c=>c.type==="formal").length;
  const preCount = claims.filter(c=>c.type==="preApproved").length;
  const subCount = claims.filter(c=>c.type==="substitute").length;
  document.getElementById("formalCount").innerText=formalCount;
  document.getElementById("preCount").innerText=preCount;
  document.getElementById("subCount").innerText=subCount;
  document.getElementById("usedQuota").innerText=claims.length;
  document.getElementById("remainingQuota").innerText=eligibleCount-claims.length;
  generateAbsentees();
}

// ------------------- 扫描领取 -------------------
function promptScan(){
  const studentId = prompt("Masukkan Student ID (cth: S001):");
  if(studentId) scanStudent(studentId.toUpperCase());
}

function scanStudent(studentId){
  const student=students.find(s=>s.studentId===studentId);
  if(!student){ alert("Pelajar tidak dijumpai!"); return; }
  if(claims.find(c=>c.studentId===studentId)){ alert(student.name+" sudah menerima!"); return; }
  let type;
  if(student.eligible && !student.preApproved) type="formal";
  else if(student.preApproved) type="preApproved";
  else type=claims.length<eligibleCount?"substitute":"rejected";
  if(type==="rejected"){ alert("Kuota habis!"); return; }

  claims.push({studentId:student.studentId,name:student.name,grade:student.grade,type:type,time:new Date().toISOString()});
  document.getElementById("scanResult").innerText = "Scan berjaya: "+student.studentId+" - "+student.name+" ("+type+")";
  broadcastClaim({studentId:student.studentId,name:student.name,grade:student.grade,type:type});
  updateQuotaDisplay();
}

// ------------------- QR / Barcode 扫描 -------------------
function startQrScanner(){
  const qrContainer = document.getElementById("qr-reader");
  qrContainer.innerHTML = "<p>Memulakan kamera...</p>";
  const html5QrcodeScanner = new Html5Qrcode("qr-reader");

  html5QrcodeScanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    qrCodeMessage => {
      scanStudent(qrCodeMessage);
      qrContainer.innerHTML = "<p>Scan berjaya: " + qrCodeMessage + "</p>";
      html5QrcodeScanner.stop().then(()=>{
        qrContainer.innerHTML += "<p>Scan berhenti.</p>";
      }).catch(err=>console.error(err));
    },
    errorMessage => { qrContainer.innerHTML = "<p>Menunggu scan...</p>"; }
  ).catch(err => { qrContainer.innerHTML = "<p>Gagal memulakan kamera: " + err + "</p>"; });
}

// ------------------- Admin: 编辑学生 -------------------
function editStudentPrompt(){
  if(currentRole!=="admin"){ alert("Hanya Admin!"); return; }
  const studentId=prompt("Masukkan Student ID untuk ubah:");
  const student=students.find(s=>s.studentId===studentId.toUpperCase());
  if(!student){ alert("Pelajar tidak dijumpai!"); return; }
  const newName=prompt("Nama Baru:",student.name);
  const newGrade=prompt("Tingkatan Baru:",student.grade);
  const eligible=confirm("Adakah pelajar layak rasmi?");
  const preApproved=confirm("Adakah pelajar pre-approve?");
  student.name=newName||student.name; student.grade=newGrade||student.grade;
  student.eligible=eligible; student.preApproved=preApproved;
  alert("Pelajar dikemaskini!");
  generateAllQRCodes(); broadcastStudentUpdate(student);
}

// ------------------- Admin: 调整合格人数 -------------------
function addAdminQuotaButton(){
  const container=document.querySelector(".row.g-3.mb-3");
  const col=document.createElement("div"); col.className="col-6";
  const btn=document.createElement("button"); btn.className="btn btn-dark btn-main"; btn.innerText="Tetapkan Jumlah Layak";
  btn.onclick=adjustEligibleCount; col.appendChild(btn); container.appendChild(col);
}
function adjustEligibleCount(){
  const newCount=parseInt(prompt("Masukkan jumlah pelajar layak:",eligibleCount));
  if(isNaN(newCount)||newCount<1||newCount>students.length){ alert("Sila masukkan nombor sah!"); return; }
  eligibleCount=newCount; students.forEach((s,i)=>s.eligible=i<eligibleCount);
  updateQuotaDisplay(); alert("Jumlah pelajar layak dikemaskini: "+eligibleCount);
  broadcastQuotaUpdate(eligibleCount);
}

// ------------------- QR 生成 -------------------
function generateAllQRCodes(){
  const container=document.getElementById("qrList"); container.innerHTML="";
  students.forEach(s=>{
    const div=document.createElement("div"); div.className="text-center m-2";
    const p=document.createElement("p"); p.innerText=s.studentId;
    const img=document.createElement("img");
    QRCode.toDataURL(s.studentId).then(url=>img.src=url);
    div.appendChild(p); div.appendChild(img); container.appendChild(div);
  });
}

// ------------------- 缺席名单 -------------------
function generateAbsentees(){
  const eligibleStudents=students.filter(s=>s.eligible);
  const absent=eligibleStudents.filter(s=>!claims.find(c=>c.studentId===s.studentId));
  localStorage.setItem("absentList",JSON.stringify(absent));
}
function showAbsentees(){
  const absent=JSON.parse(localStorage.getItem("absentList")||"[]");
  if(absent.length===0){ document.getElementById("absentList").innerHTML="<h5>Tiada pelajar Tidak Hadir hari ini.</h5>"; return; }
  let html="<h5>Senarai Pelajar Tidak Hadir Hari Ini</h5><ul class='list-group'>";
  absent.forEach(a=>{ html+="<li class='list-group-item'>"+a.studentId+" - "+a.name+" ("+a.grade+")</li>"; });
  html+="</ul>"; document.getElementById("absentList").innerHTML=html;
}

// ------------------- 每日冻结 -------------------
function checkDailyFreeze(){
  const now=new Date(), freezeTime=new Date(); freezeTime.setHours(8,0,0,0);
  if(now>=freezeTime) generateAbsentees();
}

// ------------------- 实时同步 -------------------
function broadcastClaim(data){ channel.postMessage({type:"claim",payload:data}); }
function broadcastStudentUpdate(student){ channel.postMessage({type:"studentUpdate",payload:student}); }
function broadcastQuotaUpdate(count){ channel.postMessage({type:"quotaUpdate",payload:count}); }

channel.onmessage=e=>{
  const msg=e.data;
  if(msg.type==="claim"){ 
    if(!claims.find(c=>c.studentId===msg.payload.studentId)){
      claims.push(msg.payload); updateQuotaDisplay(); 
    }
  }
  if(msg.type==="studentUpdate"){ 
    const s=students.find(x=>x.studentId===msg.payload.studentId); 
    if(s){ Object.assign(s,msg.payload); generateAllQRCodes(); } 
  }
  if(msg.type==="quotaUpdate"){ 
    eligibleCount=msg.payload; students.forEach((s,i)=>s.eligible=i<eligibleCount); updateQuotaDisplay(); 
  }
};
</script>
</body>
</html>
